name: Bug Report
description: Report a bug in PeripheralOS
title: "[Bug]: "
labels:

    * type:bug

body:

    * type: textarea
          id: description
          attributes:
          label: Description
          description: Describe the issue.
          validations:
          required: true

    * type: textarea
          id: expected
          attributes:
          label: Expected Behavior

    * type: textarea
          id: actual
          attributes:
          label: Actual Behavior

    * type: dropdown
          id: platform
          attributes:
          label: Platform
          options:
              - Linux
              - Windows
              - macOS

    * type: textarea
          id: device
          attributes:
          label: Device

    * type: textarea
          id: logs
          attributes:
          label: Logs
